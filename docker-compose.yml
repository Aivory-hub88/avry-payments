version: '3.8'

services:
  avry_payments:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avry-payments
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aivory-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avry-payments.rule=Host(`backend.aivory.id`) && PathPrefix(`/payments`)"
      - "traefik.http.routers.avry-payments.entrypoints=websecure"
      - "traefik.http.routers.avry-payments.tls.certresolver=letsencrypt"
      - "traefik.http.services.avry-payments.loadbalancer.server.port=8085"

networks:
  aivory-network:
    name: aivory-network
    external: true
